<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC -Mega_Man_6</title>
    <style>
        body{margin:0;padding:20px;background: #0c0d14;color:#fff;font-family:Arial;display:flex;flex-direction:column;align-items:center}
        h1{margin-bottom:20px;color:#ff6b6b}
        #gameContainer{background:#000;border:3px solid #0c0d14;border-radius:8px;padding:10px;box-shadow:0 0 20px rgb(0, 0, 0);width:80%;max-width:800px;position: relative;}
        #nesCanvas{display:none}
        .emulatorjs-canvas{display:block;width:100%;height:auto;border:2px solid #666;image-rendering:pixelated}

        /* 覆盖层样式 */
        #overlay {
            position: absolute;
            top: 5%;
            left: 0;
            width: 100%;
            height: 30%;
            display: flex;
            flex-direction: column;
            /*justify-content: center;*/
            align-items: center;
            background: rgba(0,0,0,0);
            z-index: 10;
        }

        #overlayImage {
            width: 80%;
            max-width: 300px;
            margin-bottom: 20px;
            filter: blur(2px);
            opacity: 0.8;
        }

        #playButton {
            background: #f37500;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }

        #playButton:hover {
            background: #ff5252;
            transform: scale(1.05);
        }

        #overlay p {
            margin-top: 20px;
            color: #ccc;
            text-align: center;
            max-width: 80%;
        }
    </style>

    <!-- EmulatorJS 全局配置 -->
    <script>
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        window.EJS_player      = '#gameContainer';
        window.EJS_gameUrl     = 'game/nes/Mega_Man_6/Mega_Man_6.nes';
        window.EJS_core        = 'nes';
        window.EJS_gameName    = 'Contra';
        window.EJS_startOnLoaded = true;
        window.EJS_color       = '#2196F3';
        window.EJS_buttons     = {
            "0":{"label":"A","key":"X"},
            "1":{"label":"B","key":"Z"},
            "2":{"label":"SELECT","key":"Shift"},
            "3":{"label":"START","key":"Enter"},
            "4":{"label":"UP","key":"ArrowUp"},
            "5":{"label":"DOWN","key":"ArrowDown"},
            "6":{"label":"LEFT","key":"ArrowLeft"},
            "7":{"label":"RIGHT","key":"ArrowRight"}
        };
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</head>
<body>
    <div id="overlay">
        <img id="overlayImage" src="game/nes/super marioNES/screenshot_04_thumb.jpg" alt="游戏封面">
        <button id="playButton">PLAY</button>
    </div>
    <div id="gameContainer" style="width: auto;height: auto;position: relative;">
        <canvas id="nesCanvas" width="256" height="250"></canvas>
    </div>

    <script src="js/Mega_Man_6.js"></script>
</body>
<script>document.addEventListener('DOMContentLoaded', function() {
    const playButton = document.getElementById('playButton');
    const overlay = document.getElementById('overlay');

    playButton.addEventListener('click', function() {
        overlay.style.display = 'none';
    });
});
</script>
</html>
